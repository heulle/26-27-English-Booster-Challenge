<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Ricky — 10-Day Booster B1</title>
<link href="https://fonts.googleapis.com/css2?family=Caveat:wght@700&family=Nunito:wght@800;900&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;}

body {
  font-family:'Nunito',sans-serif;
  background:#FFFEF7;
  color:#111;
  min-height:100vh;
}

header {
  background:#111;
  padding:1rem 1.5rem;
  display:flex;
  align-items:center;
  justify-content:space-between;
  border-bottom:4px solid #111;
}

.hdr-left {
  display:flex;
  align-items:center;
  gap:0.85rem;
}

.ricky-hdr {
  width:46px;height:46px;
  border-radius:50%;
  border:3px solid #fff;
  object-fit:cover;
  object-position:center top;
}

.hdr-title {
  font-family:'Caveat',cursive;
  font-size:1.7rem;
  color:#fff;
  line-height:1;
}

.hdr-sub {
  font-size:0.65rem;
  font-weight:900;
  color:#aaa;
  letter-spacing:0.1em;
  text-transform:uppercase;
  margin-top:1px;
}

.ephec {
  height:20px;
  filter:invert(1);
  opacity:0.6;
}

.level-bar {
  background:#111;
  padding:0 1.5rem 1rem;
  display:flex;
  gap:0.4rem;
  overflow-x:auto;
  scrollbar-width:none;
  border-bottom:4px solid #111;
}
.level-bar::-webkit-scrollbar{display:none;}

.lvl {
  flex-shrink:0;
  width:36px;height:36px;
  border-radius:8px;
  border:3px solid #444;
  background:#222;
  color:#666;
  font-family:'Caveat',cursive;
  font-size:1.15rem;
  font-weight:700;
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;
  transition:all 0.15s;
}
.lvl:hover{border-color:#fff;color:#fff;}
.lvl.active{border-color:#fff;color:#111;transform:translateY(-3px);}

.wrap {
  max-width:600px;
  margin:0 auto;
  padding:1.5rem 1.25rem 5rem;
}

.q-block {
  border:4px solid #111;
  border-radius:20px;
  padding:1.5rem;
  margin-bottom:1rem;
  position:relative;
  box-shadow:6px 6px 0 #111;
  animation:pop 0.35s cubic-bezier(.34,1.56,.64,1) both;
}

@keyframes pop{
  from{transform:scale(0.88) translateY(16px);opacity:0;}
  to{transform:scale(1) translateY(0);opacity:1;}
}

.q-num {
  font-family:'Caveat',cursive;
  font-size:5rem;
  font-weight:700;
  line-height:1;
  opacity:0.12;
  position:absolute;
  bottom:0.5rem;
  right:1rem;
  pointer-events:none;
  user-select:none;
}

.q-label {
  display:inline-block;
  background:#111;
  color:#fff;
  font-size:0.65rem;
  font-weight:900;
  letter-spacing:0.1em;
  text-transform:uppercase;
  padding:0.3rem 0.85rem;
  border-radius:99px;
  margin-bottom:1rem;
}

.q-text {
  font-family:'Caveat',cursive;
  font-size:1.7rem;
  font-weight:700;
  line-height:1.25;
  margin-bottom:1.1rem;
}

.sub-list {
  list-style:none;
  display:flex;
  flex-direction:column;
  gap:0.5rem;
}

.sub-list li {
  display:flex;
  gap:0.6rem;
  align-items:flex-start;
  font-size:0.88rem;
  line-height:1.5;
  color:#333;
  font-weight:800;
}

.dot {
  flex-shrink:0;
  width:22px;height:22px;
  border-radius:50%;
  border:2.5px solid #111;
  display:flex;align-items:center;justify-content:center;
  font-family:'Caveat',cursive;
  font-size:0.75rem;
  font-weight:700;
  margin-top:1px;
  color:#111;
}

.panel {
  border:3.5px solid #111;
  border-radius:16px;
  margin-bottom:0.85rem;
  overflow:hidden;
  box-shadow:4px 4px 0 #111;
  animation:pop 0.3s ease both;
}

.panel-hd {
  padding:1rem 1.1rem;
  display:flex;
  align-items:center;
  gap:0.75rem;
  cursor:pointer;
  user-select:none;
}

.panel-icon { font-size:1.3rem; }

.panel-title {
  font-size:0.82rem;
  font-weight:900;
  text-transform:uppercase;
  letter-spacing:0.07em;
  flex:1;
}

.panel-arrow {
  font-family:'Caveat',cursive;
  font-size:1.4rem;
  font-weight:700;
  color:#111;
  transition:transform 0.2s;
}
.panel-arrow.open{transform:rotate(90deg);}

.panel-body {
  max-height:0;
  overflow:hidden;
  transition:max-height 0.3s ease;
}
.panel-body.open{
  max-height:400px;
  border-top:3px solid #111;
}

.panel-inner {
  padding:1rem 1.1rem;
  font-size:0.86rem;
  line-height:1.7;
  color:#222;
  font-weight:800;
}

.ricky-row {
  display:flex;
  align-items:flex-end;
  gap:0.85rem;
  margin-bottom:1rem;
  animation:pop 0.35s 0.1s ease both;
}

.ricky-img {
  width:60px;height:60px;
  border-radius:50%;
  border:4px solid #111;
  object-fit:cover;
  object-position:center top;
  flex-shrink:0;
}

.bubble {
  flex:1;
  border:3.5px solid #111;
  border-radius:16px 16px 16px 4px;
  padding:1rem 1.1rem;
  font-family:'Caveat',cursive;
  font-size:1.15rem;
  font-weight:700;
  line-height:1.45;
  box-shadow:4px 4px 0 #111;
}

.practice-btn {
  width:100%;
  padding:1.1rem;
  border:4px solid #111;
  border-radius:16px;
  font-family:'Caveat',cursive;
  font-size:1.5rem;
  font-weight:700;
  cursor:pointer;
  box-shadow:6px 6px 0 #111;
  transition:all 0.12s;
  display:flex;
  align-items:center;
  justify-content:center;
  gap:0.5rem;
  margin-bottom:1rem;
  color:#111;
}
.practice-btn:hover{transform:translateY(-3px);box-shadow:6px 9px 0 #111;}
.practice-btn:active{transform:translateY(2px);box-shadow:3px 3px 0 #111;}

.nav {
  display:flex;
  gap:0.75rem;
}

.nav-btn {
  flex:1;
  padding:0.85rem;
  border:3.5px solid #111;
  border-radius:14px;
  background:#fff;
  font-family:'Caveat',cursive;
  font-size:1.2rem;
  font-weight:700;
  color:#111;
  cursor:pointer;
  box-shadow:4px 4px 0 #111;
  transition:all 0.12s;
}
.nav-btn:hover:not(:disabled){transform:translateY(-2px);box-shadow:4px 6px 0 #111;}
.nav-btn:active:not(:disabled){transform:translateY(1px);box-shadow:2px 2px 0 #111;}
.nav-btn:disabled{opacity:0.25;cursor:default;box-shadow:none;}

.overlay {
  position:fixed;inset:0;
  background:rgba(0,0,0,0.6);
  z-index:500;
  display:flex;align-items:center;justify-content:center;
  padding:1.5rem;
  opacity:0;pointer-events:none;
  transition:opacity 0.2s;
}
.overlay.open{opacity:1;pointer-events:all;}

.modal {
  background:#FFFEF7;
  border:4px solid #111;
  border-radius:20px;
  max-width:540px;width:100%;
  box-shadow:8px 8px 0 #111;
  transform:scale(0.92) translateY(16px);
  transition:transform 0.25s cubic-bezier(.34,1.56,.64,1);
  max-height:90vh;overflow-y:auto;
}
.overlay.open .modal{transform:scale(1) translateY(0);}

.modal-top {
  padding:1.25rem 1.5rem;
  border-bottom:4px solid #111;
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.modal-title {
  font-family:'Caveat',cursive;
  font-size:1.5rem;
  font-weight:700;
}

.modal-x {
  width:36px;height:36px;
  border:3px solid #111;
  border-radius:50%;
  background:#fff;
  font-size:1.1rem;
  font-weight:900;
  cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  transition:all 0.15s;
}
.modal-x:hover{background:#111;color:#fff;}

.modal-body{padding:1.5rem;}

.modal-hint{
  font-size:0.82rem;font-weight:800;
  color:#555;margin-bottom:1rem;line-height:1.6;
}

.prompt-box {
  background:#fff;
  border:3px dashed #ccc;
  border-radius:12px;
  padding:1rem;
  font-size:0.78rem;
  line-height:1.8;
  color:#444;
  white-space:pre-wrap;
  word-break:break-word;
  max-height:200px;overflow-y:auto;
  margin-bottom:1rem;
  font-family:'Nunito',sans-serif;
  font-weight:800;
}

.copy-btn {
  width:100%;
  padding:1rem;
  border:3.5px solid #111;
  border-radius:12px;
  font-family:'Caveat',cursive;
  font-size:1.3rem;
  font-weight:700;
  cursor:pointer;
  box-shadow:5px 5px 0 #111;
  transition:all 0.12s;
  margin-bottom:0.75rem;
  color:#111;
}
.copy-btn:hover{transform:translateY(-2px);box-shadow:5px 7px 0 #111;}
.copy-btn.copied{background:#55EFC4!important;}

.ptags{display:flex;flex-wrap:wrap;gap:0.4rem;}
.ptag{
  background:#fff;border:2.5px solid #111;
  border-radius:99px;padding:0.2rem 0.7rem;
  font-size:0.68rem;font-weight:900;color:#111;
}

footer{
  text-align:center;padding:1.25rem;
  font-size:0.72rem;color:#aaa;font-weight:800;
  border-top:3px dashed #eee;
}
</style>

function buildPrompt(d,i){
  return `You are Ricky, an encouraging but realistic Business English oral exam coach targeting B1 level (CECR). This is a first-year student.

Today is Day ${i+1} of the 10-Day Booster Challenge.

TOPIC: ${d.topic}

YOUR TASK:
1. Warmly greet the student and ask them this question:
"${d.q}"

Sub-questions to explore:
${d.subs.map(s=>'- '+s).join('\n')}

2. After they answer, evaluate:
   - Is the level genuinely B1 or above?
   - Do they justify ideas and give examples?
   - Is the answer structured and easy to follow?

3. If below B1: give specific, kind corrections with brief explanations.

4. If too short, push them using:
   - ${d.think}
   - ${d.tips}

RICKY'S STYLE: warm, direct, honest. Always explain corrections. End by inviting them to go deeper.

Start now — greet the student and ask the question!`;
}

let cur = 0;

function renderLevels(){
  const el = document.getElementById('levelBar');
  el.innerHTML = '';
  days.forEach((_,i)=>{
    const b = document.createElement('button');
    b.className='lvl'+(i===cur?' active':'');
    b.textContent = i+1;
    if(i===cur) b.style.background = COLORS[i];
    b.onclick=()=>{cur=i;render();};
    el.appendChild(b);
  });
}

function togglePanel(hd){
  const body = hd.nextElementSibling;
  const arr = hd.querySelector('.panel-arrow');
  const open = body.classList.toggle('open');
  if(arr) arr.classList.toggle('open', open);
}

      ${em} Practice with Ricky!
    </button>

    <div class="nav">
      <button class="nav-btn" onclick="go(-1)" ${cur===0?'disabled':''}>← Prev</button>

function go(dir){
  cur=Math.max(0,Math.min(days.length-1,cur+dir));
  render();
  window.scrollTo({top:0,behavior:'smooth'});
}

function openModal(){
  document.getElementById('promptBox').textContent = buildPrompt(days[cur],cur);
  const btn = document.getElementById('copyBtn');
  btn.textContent='📋 Copy prompt';
  btn.style.background=COLORS[cur];
  btn.classList.remove('copied');
  document.getElementById('overlay').classList.add('open');
}

function closeModal(){
  document.getElementById('overlay').classList.remove('open');
}

function closeBg(e){
  if(e.target===document.getElementById('overlay')) closeModal();
}

function copyPrompt(){
  navigator.clipboard.writeText(document.getElementById('promptBox').textContent).then(()=>{
    const btn=document.getElementById('copyBtn');
    btn.textContent='✓ Copied!';
    btn.classList.add('copied');
    setTimeout(()=>{
      btn.textContent='📋 Copy prompt';
      btn.classList.remove('copied');
      btn.style.background=COLORS[cur];
    },2500);
  });
}

render();
</script>
